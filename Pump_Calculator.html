<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Centrifugal Pump · Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="lib/pumpMath.js"></script>
<script src="lib/units.js"></script>
<script src="lib/duty.js"></script>
<script type="text/babel" src="components/PumpChart.jsx"></script>
<script type="text/babel" src="components/Calculator.jsx"></script>
<script type="text/babel" src="components/Report.jsx"></script>
<script type="text/babel" src="components/Compare.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "airy",
  "showTweaks": false
}/*EDITMODE-END*/;

const initialState = {
  fluid: { key: "Water", tempC: 20 },
  sys: {
    rho: 998, mu: 1.0, Pvap_kPa: 2.34, Patm_kPa: 101.3,
    Zs: 1.5, Zd: 19.5, Ps_kPa: 0, Pd_kPa: 0,
    Ds: 154.1, Ls: 8,
    Dd: 128.2, Ld: 85,
    eps: 0.046,
    fitS: [
      { type: "entrance_sharp", qty: 1 },
      { type: "elbow90_lr", qty: 2 },
      { type: "gate", qty: 1 },
      { type: "foot", qty: 1 },
    ],
    fitD: [
      { type: "check_swing", qty: 1 },
      { type: "gate", qty: 1 },
      { type: "elbow90_lr", qty: 4 },
      { type: "exit", qty: 1 },
    ],
  },
  pump: {
    Qb: 120, Hb: 32, etaMax: 0.78, NPSHr_bep: 3.2,
    N0: 2950, D0: 260,
    N: 2950, D: 260,
    useCatalog: false,
    catalog: [
      { q: 0,   h: 40, eta: 0,    npshr: 2.2 },
      { q: 60,  h: 38, eta: 0.62, npshr: 2.4 },
      { q: 120, h: 32, eta: 0.78, npshr: 3.2 },
      { q: 160, h: 26, eta: 0.74, npshr: 4.6 },
      { q: 200, h: 17, eta: 0.60, npshr: 7.0 },
    ],
    npshRatio: 1.3,
    minFlowPct: 45,
    arrangement: "single",
    nPumps: 2,
    showSpeedFamily: false,
  },
  design: { flowMargin: 10, headMargin: 0 },
  econ: { hours: 8000, price: 0.12 },
  meta: {
    project: "Raw-Water Transfer Skid - Unit 200",
    tag: "P-101A",
    docNo: "CAL-HYD-0142",
    rev: "D",
    preparedBy: "",
    discipline: "",
  },
  unitSystem: "SI",
  op: { Q: 110 },
};

function App() {
  const [state, setState] = useState(initialState);
  const [view, setView] = useState("calc");        // calc | report
  const [density, setDensity] = useState(TWEAK_DEFAULTS.density);
  const [tweaksOn, setTweaksOn] = useState(false);

  useEffect(() => { document.documentElement.dataset.density = density; document.body.dataset.density = density; }, [density]);

  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("pumpcalc:v4") || "null");
      if (saved) {
        const savedMeta = { ...(saved.meta || {}) };
        if (savedMeta.preparedBy === "J. Rivera") {
          savedMeta.preparedBy = "";
          savedMeta.discipline = "";
        }
        setState(s => ({
        ...s, ...saved,
        pump: { ...s.pump, ...(saved.pump || {}) },
        sys:  { ...s.sys,  ...(saved.sys  || {}) },
        design: { ...s.design, ...(saved.design || {}) },
        econ: { ...s.econ, ...(saved.econ || {}) },
        meta: { ...s.meta, ...savedMeta },
      }));
      }
      const savedView = localStorage.getItem("pumpcalc:view");
      if (savedView) setView(savedView);
    } catch {}
  }, []);
  useEffect(() => { localStorage.setItem("pumpcalc:v4", JSON.stringify(state)); }, [state]);
  useEffect(() => { localStorage.setItem("pumpcalc:view", view); }, [view]);

  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode")   setTweaksOn(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message", onMsg);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch {}
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const persist = (edits) => {
    try { window.parent.postMessage({ type: "__edit_mode_set_keys", edits }, "*"); } catch {}
  };

  // Saved-case library
  const [cases, setCases] = useState({});
  const [caseName, setCaseName] = useState("");
  useEffect(() => {
    try { setCases(JSON.parse(localStorage.getItem("pumpcalc:cases") || "{}")); } catch {}
  }, []);
  const writeCases = (next) => { setCases(next); localStorage.setItem("pumpcalc:cases", JSON.stringify(next)); };
  const saveCase = () => {
    const name = (caseName || "").trim() || `Case ${Object.keys(cases).length + 1}`;
    writeCases({ ...cases, [name]: state });
    setCaseName(name);
  };
  const loadCase = (name) => { if (cases[name]) setState(cases[name]); setCaseName(name); };
  const delCase = (name) => { const n = { ...cases }; delete n[name]; writeCases(n); if (caseName === name) setCaseName(""); };

  return (
    <div>
      <div className="topbar">
        <div className="brand">
          <span className="brand-mark" />
          <div>
            <div className="brand-name">Centrifugal · Pump Sizing</div>
            <div className="brand-sub mono">v0.10 — {state.unitSystem || "SI"}</div>
          </div>
        </div>
        <div className="topbar-tabs">
          <div className={"tab" + (view === "calc" ? " active" : "")} onClick={() => setView("calc")}>
            <span className="tab-num">01</span> Calculator
          </div>
          <div className={"tab" + (view === "report" ? " active" : "")} onClick={() => setView("report")}>
            <span className="tab-num">02</span> Report preview
          </div>
          <div className={"tab" + (view === "compare" ? " active" : "")} onClick={() => setView("compare")}>
            <span className="tab-num">03</span> Compare
          </div>
        </div>
        <div className="topbar-right">
          <div className="seg unit-seg">
            <button className={(state.unitSystem || "SI") === "SI" ? "on" : ""}
                    onClick={() => setState(s => ({ ...s, unitSystem: "SI" }))}>SI</button>
            <button className={state.unitSystem === "US" ? "on" : ""}
                    onClick={() => setState(s => ({ ...s, unitSystem: "US" }))}>US</button>
          </div>
          <div className="cases">
            <span className="tiny" style={{marginRight:2}}>Cases</span>
            <select className="case-sel" value={cases[caseName] ? caseName : ""}
                    onChange={e => e.target.value && loadCase(e.target.value)}>
              <option value="">Load…</option>
              {Object.keys(cases).map(n => <option key={n} value={n}>{n}</option>)}
            </select>
            <input className="case-name" placeholder="name" value={caseName}
                   onChange={e => setCaseName(e.target.value)} />
            <button className="btn" onClick={saveCase}>Save</button>
            {cases[caseName] && <button className="btn" onClick={() => delCase(caseName)} title="delete case">✕</button>}
          </div>
          <span><span className="dot" />autosave</span>
          <button className="btn" onClick={() => window.print()}>Print / PDF</button>
        </div>
      </div>

      <div className={"view" + (view === "calc" ? " active" : "")} data-screen-label="01 Calculator">
        <window.Calculator state={state} setState={setState} />
      </div>
      <div className={"view" + (view === "report" ? " active" : "")} data-screen-label="02 Report">
        <window.Report state={state} />
      </div>
      <div className={"view" + (view === "compare" ? " active" : "")} data-screen-label="03 Compare">
        <window.Compare liveState={state} cases={cases} unitSystem={state.unitSystem || "SI"} />
      </div>

      <div className="status">
        <span>DRW · {state.meta?.docNo || "CAL-HYD-0142"}</span><span className="sep">│</span>
        <span>REV {state.meta?.rev || "D"}</span><span className="sep">│</span>
        <span>SCALE — NTS</span><span className="sep">│</span>
        <span>SHEET 1/1</span><span className="sep">│</span>
        <span>UNITS — {state.unitSystem || "SI"}</span><span className="sep">│</span>
        <span>ρ={state.sys.rho} kg/m³ · μ={state.sys.mu.toFixed(2)} cP</span>
      </div>

      {tweaksOn && (
        <div className="tweaks">
          <header>
            <span>Tweaks</span>
            <span className="mono" style={{color:"var(--mute)"}}>2 opts</span>
          </header>
          <div className="row">
            <div className="label">Layout density</div>
            <div className="seg">
              <button className={density === "airy" ? "on" : ""}
                      onClick={() => { setDensity("airy"); persist({ density: "airy" }); }}>Airy</button>
              <button className={density === "compact" ? "on" : ""}
                      onClick={() => { setDensity("compact"); persist({ density: "compact" }); }}>Compact</button>
            </div>
          </div>
          <div className="row">
            <div className="label">Reset state</div>
            <button className="btn" onClick={() => { localStorage.removeItem("pumpcalc:v4"); setState(initialState); }}>
              Restore defaults
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

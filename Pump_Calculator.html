<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Centrifugal Pump · Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="lib/pumpMath.js"></script>
<script src="lib/units.js"></script>
<script src="lib/caseLibrary.js"></script>
<script src="lib/duty.js"></script>
<script type="text/babel" src="components/PumpChart.jsx"></script>
<script type="text/babel" src="components/Calculator.jsx"></script>
<script type="text/babel" src="components/Report.jsx"></script>
<script type="text/babel" src="components/Compare.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "airy",
  "showTweaks": false
}/*EDITMODE-END*/;

const initialState = {
  fluid: { key: "Water", tempC: 20, validMinC: 0, validMaxC: 99, freezeC: 0 },
  sys: {
    rho: 998, mu: 1.0, Pvap_kPa: 2.34, Patm_kPa: 101.3,
    Zs: 1.5, Zd: 19.5, Ps_kPa: 0, Pd_kPa: 0,
    Ds: 154.1, Ls: 8,
    Dd: 128.2, Ld: 85,
    eps: 0.046, epsS: 0.046, epsD: 0.046,
    equipmentCondition: "clean",
    equipment: [],
    fitS: [
      { type: "entrance_sharp", qty: 1 },
      { type: "elbow90_lr", qty: 2 },
      { type: "gate", qty: 1 },
      { type: "foot", qty: 1 },
    ],
    fitD: [
      { type: "check_swing", qty: 1 },
      { type: "gate", qty: 1 },
      { type: "elbow90_lr", qty: 4 },
      { type: "exit", qty: 1 },
    ],
  },
  pump: {
    Qb: 120, Hb: 32, etaMax: 0.78, NPSHr_bep: 3.2,
    N0: 2950, D0: 260,
    N: 2950, D: 260,
    useCatalog: false,
    catalog: [
      { q: 0,   h: 40, eta: 0,    npshr: 2.2 },
      { q: 60,  h: 38, eta: 0.62, npshr: 2.4 },
      { q: 120, h: 32, eta: 0.78, npshr: 3.2 },
      { q: 160, h: 26, eta: 0.74, npshr: 4.6 },
      { q: 200, h: 17, eta: 0.60, npshr: 7.0 },
    ],
    npshRatio: 1.3,
    npshMarginAbs: 0.6,
    minFlowPct: 45,
    thermalMinFlow: 0,
    porMinPct: 70, porMaxPct: 120,
    aorMinPct: 50, aorMaxPct: 130,
    nssLimit: 213,
    motorMarginPct: 15,
    arrangement: "single",
    installedPumps: 2,
    nPumps: 2,
    parallelImbalancePct: 0,
    showSpeedFamily: false,
  },
  design: { requiredQ: 110, headMode: "system", requiredH: 0, flowMargin: 10, headMargin: 0 },
  scenario: {
    ZsMin: 0.5, ZsNormal: 1.5, ZsMax: 2.5,
    ZdMin: 18.5, ZdNormal: 19.5, ZdMax: 20.5,
    PatmMin_kPa: 95, maxTempC: 40, PvapMax_kPa: 7.38, rhoMax: 1000,
  },
  econ: { hours: 8000, price: 0.12 },
  meta: {
    project: "Raw-Water Transfer Skid - Unit 200",
    tag: "P-101A",
    docNo: "CAL-HYD-0142",
    rev: "D",
    preparedBy: "",
    discipline: "",
  },
  unitSystem: "SI",
  op: { Q: 110 },
};

const {
  APP_VERSION,
  buildCaseExport,
  buildCaseLibraryExport,
  buildCaseLinkHash,
  mergeState,
  parseCaseImport,
  parseCaseLinkHash,
  uniqueCaseName,
} = window.PumpCases;

function downloadJson(filename, data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function serializeCaseState(value) {
  return JSON.stringify(value || {});
}

function buildNewCaseState() {
  return mergeState(initialState, {
    sys: {
      Zs: 0,
      Zd: 0,
      Ps_kPa: 0,
      Pd_kPa: 0,
      Ls: 0,
      Ld: 0,
      fitS: [],
      fitD: [],
    },
    meta: {
      project: "",
      tag: "",
      docNo: "",
      rev: "",
      preparedBy: "",
      discipline: "",
    },
    op: { Q: initialState.pump.Qb },
  });
}

function cleanTitlePart(value) {
  return String(value || "")
    .trim()
    .replace(/[\\/:*?"<>|]+/g, "-")
    .replace(/\s+/g, " ");
}

function buildPrintTitle(meta = {}) {
  const docNo = cleanTitlePart(meta.docNo) || "Pump Calculation";
  const rev = cleanTitlePart(meta.rev);
  const tag = cleanTitlePart(meta.tag);
  const project = cleanTitlePart(meta.project);
  return [docNo, rev ? `Rev ${rev}` : "", tag, project].filter(Boolean).join(" - ");
}

function App() {
  const [state, setState] = useState(initialState);
  const baselineRef = useRef(serializeCaseState(initialState));
  const skipInitialAutosaveRef = useRef(true);
  const [view, setView] = useState("calc");        // calc | report | compare
  const [density, setDensity] = useState(TWEAK_DEFAULTS.density);
  const [tweaksOn, setTweaksOn] = useState(false);
  const importRef = useRef(null);
  const [caseNotice, setCaseNotice] = useState("");
  const [caseManagerOpen, setCaseManagerOpen] = useState(false);
  const [managerSelection, setManagerSelection] = useState("");
  const [managerDraftName, setManagerDraftName] = useState("");
  const caseManagerPanelRef = useRef(null);
  const restorePrintTitleRef = useRef(null);

  useEffect(() => { document.documentElement.dataset.density = density; document.body.dataset.density = density; }, [density]);

  useEffect(() => {
    try {
      const linked = parseCaseLinkHash(window.location.hash, initialState);
      if (linked) {
        const snapshot = serializeCaseState(linked.state);
        baselineRef.current = snapshot;
        localStorage.setItem("pumpcalc:baseline", snapshot);
        localStorage.setItem("pumpcalc:v4", JSON.stringify(linked.state));
        setState(linked.state);
        setCaseName(linked.name);
        setCaseNotice(`Opened shared link "${linked.name}". Save it to keep it in your library.`);
        return;
      }
      const saved = JSON.parse(localStorage.getItem("pumpcalc:v4") || "null");
      if (saved) {
        const merged = mergeState(initialState, saved);
        const savedBaseline = localStorage.getItem("pumpcalc:baseline");
        baselineRef.current = savedBaseline != null ? savedBaseline : serializeCaseState(merged);
        setState(merged);
      } else {
        baselineRef.current = serializeCaseState(initialState);
      }
      const savedView = localStorage.getItem("pumpcalc:view");
      if (savedView) setView(savedView);
    } catch {}
  }, []);
  useEffect(() => {
    if (skipInitialAutosaveRef.current) {
      skipInitialAutosaveRef.current = false;
      return;
    }
    localStorage.setItem("pumpcalc:v4", JSON.stringify(state));
  }, [state]);
  useEffect(() => { localStorage.setItem("pumpcalc:view", view); }, [view]);

  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode")   setTweaksOn(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOn(false);
    };
    window.addEventListener("message", onMsg);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch {}
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const persist = (edits) => {
    try { window.parent.postMessage({ type: "__edit_mode_set_keys", edits }, "*"); } catch {}
  };

  // Saved-case library
  const [cases, setCases] = useState({});
  const [caseName, setCaseName] = useState("");
  const markCleanState = (nextState) => {
    const snapshot = serializeCaseState(nextState);
    baselineRef.current = snapshot;
    localStorage.setItem("pumpcalc:baseline", snapshot);
  };
  const markNoSavedBaseline = () => {
    baselineRef.current = "";
    localStorage.setItem("pumpcalc:baseline", "");
  };
  useEffect(() => {
    try { setCases(JSON.parse(localStorage.getItem("pumpcalc:cases") || "{}")); } catch {}
  }, []);
  useEffect(() => {
    if (!caseManagerOpen) return;
    const previousFocus = document.activeElement;
    const onKeyDown = (event) => {
      if (event.key === "Escape") {
        event.preventDefault();
        setCaseManagerOpen(false);
      }
    };
    window.addEventListener("keydown", onKeyDown);
    window.setTimeout(() => {
      const target = caseManagerPanelRef.current?.querySelector("button, input, select");
      target?.focus();
    }, 0);
    return () => {
      window.removeEventListener("keydown", onKeyDown);
      if (previousFocus && typeof previousFocus.focus === "function") {
        window.setTimeout(() => previousFocus.focus(), 0);
      }
    };
  }, [caseManagerOpen]);
  const writeCases = (next) => { setCases(next); localStorage.setItem("pumpcalc:cases", JSON.stringify(next)); };
  const selectManagerCase = (name) => {
    setManagerSelection(name);
    setManagerDraftName(name);
  };
  const openCaseManager = () => {
    const names = Object.keys(cases);
    const preferred = cases[caseName] ? caseName : (names[0] || "");
    selectManagerCase(preferred);
    setCaseManagerOpen(true);
  };
  const currentWorkIsDirty = () => serializeCaseState(state) !== baselineRef.current;
  const protectCurrentWork = (action, existingCases) => {
    const existing = existingCases || {};
    if (!currentWorkIsDirty()) return { cases: existing, snapshotName: "" };
    const ok = window.confirm(
      `Current work has changes since the last saved, loaded, or imported case. Save a "Before ${action}" snapshot and continue?`
    );
    if (!ok) {
      setCaseNotice(`${action} cancelled.`);
      return null;
    }
    const stamp = new Date().toISOString().slice(0, 16).replace("T", " ");
    const snapshotName = uniqueCaseName(`Before ${action} ${stamp}`, existing);
    return {
      cases: { ...existing, [snapshotName]: state },
      snapshotName,
    };
  };
  const saveCase = () => {
    const name = (caseName || "").trim() || `Case ${Object.keys(cases).length + 1}`;
    const next = { ...cases, [name]: state };
    writeCases(next);
    markCleanState(state);
    setCaseName(name);
    setCaseNotice(`Saved "${name}".`);
  };
  const newCase = () => {
    const protectedWork = protectCurrentWork("new case", cases);
    if (!protectedWork) return;
    const nextState = buildNewCaseState();
    writeCases(protectedWork.cases);
    markCleanState(nextState);
    setState(nextState);
    setCaseName("New case");
    setView("calc");
    setCaseNotice(`${protectedWork.snapshotName ? `Saved snapshot "${protectedWork.snapshotName}". ` : ""}Started new case.`);
  };
  const loadCase = (name) => {
    if (!cases[name]) return false;
    const protectedWork = protectCurrentWork("load", cases);
    if (!protectedWork) return false;
    writeCases(protectedWork.cases);
    const nextState = mergeState(initialState, protectedWork.cases[name]);
    markCleanState(nextState);
    setState(nextState);
    setCaseName(name);
    setCaseNotice(`${protectedWork.snapshotName ? `Saved snapshot "${protectedWork.snapshotName}". ` : ""}Loaded "${name}".`);
    return true;
  };
  const delCase = (name) => {
    const n = { ...cases };
    delete n[name];
    writeCases(n);
    if (caseName === name) {
      setCaseName("");
      markNoSavedBaseline();
    }
    if (managerSelection === name) {
      const nextName = Object.keys(n)[0] || "";
      selectManagerCase(nextName);
    }
    setCaseNotice(`Deleted "${name}".`);
  };
  const renameSelectedCase = () => {
    const from = managerSelection;
    const to = managerDraftName.trim();
    if (!from || !cases[from] || !to) return;
    if (to !== from && cases[to]) {
      alert(`A case named "${to}" already exists.`);
      return;
    }
    if (to === from) {
      setCaseNotice(`"${from}" is already named "${to}".`);
      return;
    }
    const next = {};
    Object.entries(cases).forEach(([name, saved]) => {
      next[name === from ? to : name] = saved;
    });
    writeCases(next);
    if (caseName === from) setCaseName(to);
    selectManagerCase(to);
    setCaseNotice(`Renamed "${from}" to "${to}".`);
  };
  const duplicateSelectedCase = () => {
    const from = managerSelection;
    if (!from || !cases[from]) return;
    const copyName = uniqueCaseName(`${from} copy`, cases);
    const next = { ...cases, [copyName]: JSON.parse(serializeCaseState(cases[from])) };
    writeCases(next);
    selectManagerCase(copyName);
    setCaseNotice(`Duplicated "${from}" as "${copyName}".`);
  };
  const loadSelectedCase = () => {
    if (!managerSelection || !cases[managerSelection]) return;
    if (loadCase(managerSelection)) setCaseManagerOpen(false);
  };
  const exportSelectedCase = () => {
    if (!managerSelection || !cases[managerSelection]) return;
    const { filename, payload } = buildCaseExport(cases[managerSelection], managerSelection);
    downloadJson(filename, payload);
    setCaseNotice(`Exported "${managerSelection}".`);
  };
  const exportCase = () => {
    const name = (caseName || state.meta?.tag || state.meta?.docNo || "Current case").trim();
    const { filename, payload } = buildCaseExport(state, name);
    downloadJson(filename, payload);
    setCaseNotice("Exported current case.");
  };
  const exportCaseLibrary = () => {
    const { filename, payload } = buildCaseLibraryExport(cases);
    downloadJson(filename, payload);
    setCaseNotice("Exported saved library.");
  };
  const importCaseFile = (event) => {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const payload = JSON.parse(reader.result);
        const result = parseCaseImport(payload, file.name, cases, initialState);
        let nextCases = result.cases;
        let snapshotName = "";
        if (result.activeState) {
          const protectedWork = protectCurrentWork("import", result.cases);
          if (!protectedWork) return;
          nextCases = protectedWork.cases;
          snapshotName = protectedWork.snapshotName;
        }
        writeCases(nextCases);
        if (result.activeState) {
          markCleanState(result.activeState);
          setCaseName(result.activeName);
          setState(result.activeState);
        }
        setCaseNotice(`${snapshotName ? `Saved snapshot "${snapshotName}". ` : ""}${result.message}`);
      } catch (err) {
        alert(`Could not import case JSON: ${err.message}`);
        setCaseNotice("Import failed.");
      } finally {
        event.target.value = "";
      }
    };
    reader.readAsText(file);
  };
  const copyShareLink = async () => {
    const name = (caseName || state.meta?.tag || state.meta?.docNo || "Current case").trim();
    const hash = buildCaseLinkHash(state, name);
    const url = `${window.location.href.split("#")[0]}${hash}`;
    window.history.replaceState(null, "", url);
    let copied = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(url);
        copied = true;
      }
    } catch {}
    setCaseNotice(copied ? "Copied share link." : "Share link is ready in the address bar.");
  };
  const printReport = () => {
    if (restorePrintTitleRef.current) restorePrintTitleRef.current();
    const previousTitle = document.title;
    const nextTitle = buildPrintTitle(state.meta);
    const restoreTitle = () => {
      document.title = previousTitle;
      window.removeEventListener("afterprint", restoreTitle);
      if (restorePrintTitleRef.current === restoreTitle) restorePrintTitleRef.current = null;
    };
    restorePrintTitleRef.current = restoreTitle;
    document.title = nextTitle;
    window.addEventListener("afterprint", restoreTitle, { once: true });
    setView("report");
    window.setTimeout(() => window.print(), 0);
  };

  const caseNames = Object.keys(cases);
  const selectedManagedCase = managerSelection ? cases[managerSelection] : null;
  const viewTabs = [
    { key: "calc", num: "01", label: "Calculator", panelId: "panel-calc" },
    { key: "report", num: "02", label: "Report preview", panelId: "panel-report" },
    { key: "compare", num: "03", label: "Compare", panelId: "panel-compare" },
  ];
  const focusTab = (key) => {
    window.requestAnimationFrame(() => document.getElementById(`tab-${key}`)?.focus());
  };
  const onTabKeyDown = (event) => {
    const currentIndex = viewTabs.findIndex(tab => tab.key === view);
    let nextIndex = currentIndex;
    if (event.key === "ArrowRight") nextIndex = (currentIndex + 1) % viewTabs.length;
    else if (event.key === "ArrowLeft") nextIndex = (currentIndex + viewTabs.length - 1) % viewTabs.length;
    else if (event.key === "Home") nextIndex = 0;
    else if (event.key === "End") nextIndex = viewTabs.length - 1;
    else return;
    event.preventDefault();
    const nextView = viewTabs[nextIndex].key;
    setView(nextView);
    focusTab(nextView);
  };

  return (
    <div>
      <div className="topbar">
        <div className="brand">
          <span className="brand-mark" />
          <div>
            <div className="brand-name">Centrifugal · Pump Sizing</div>
            <div className="brand-sub mono">v{APP_VERSION} — {state.unitSystem || "SI"}</div>
          </div>
        </div>
        <div className="topbar-tabs" role="tablist" aria-label="Main views">
          {viewTabs.map(tab => (
            <button key={tab.key}
                    id={`tab-${tab.key}`}
                    type="button"
                    role="tab"
                    aria-selected={view === tab.key}
                    aria-controls={tab.panelId}
                    tabIndex={view === tab.key ? 0 : -1}
                    className={"tab" + (view === tab.key ? " active" : "")}
                    onClick={() => setView(tab.key)}
                    onKeyDown={onTabKeyDown}>
              <span className="tab-num">{tab.num}</span> {tab.label}
            </button>
          ))}
        </div>
        <div className="topbar-right">
          <div className="seg unit-seg">
            <button className={(state.unitSystem || "SI") === "SI" ? "on" : ""}
                    onClick={() => setState(s => ({ ...s, unitSystem: "SI" }))}>SI</button>
            <button className={state.unitSystem === "US" ? "on" : ""}
                    onClick={() => setState(s => ({ ...s, unitSystem: "US" }))}>US</button>
          </div>
          <div className="cases">
            <span className="tiny" style={{marginRight:2}}>Cases</span>
            <select className="case-sel" value={cases[caseName] ? caseName : ""}
                    onChange={e => e.target.value && loadCase(e.target.value)}>
              <option value="">Load…</option>
              {caseNames.map(n => <option key={n} value={n}>{n}</option>)}
            </select>
            <input className="case-name" placeholder="name" value={caseName}
                   onChange={e => setCaseName(e.target.value)} />
            <button className="btn" onClick={newCase} title="start a blank calculation case">New</button>
            <button className="btn" onClick={saveCase}>Save</button>
            <button className="btn" onClick={exportCase} title="export current case as JSON">Export</button>
            <button className="btn" onClick={openCaseManager} title="manage saved cases">Manage</button>
            <button className="btn" onClick={copyShareLink} title="copy a link to this exact case">Share</button>
            <input ref={importRef} type="file" accept="application/json,.json" onChange={importCaseFile} style={{display:"none"}} />
            {caseNotice && <span className="case-notice" title={caseNotice}>{caseNotice}</span>}
          </div>
          <span><span className="dot" />autosave</span>
          <button className="btn" onClick={printReport} title="switch to report preview and print the report sheet">Print Report / PDF</button>
        </div>
      </div>

      {caseManagerOpen && (
        <div className="case-manager-backdrop" role="presentation" onClick={(e) => e.target === e.currentTarget && setCaseManagerOpen(false)}>
          <section ref={caseManagerPanelRef}
                   className="case-manager-panel"
                   role="dialog"
                   aria-modal="true"
                   aria-labelledby="case-manager-title"
                   tabIndex={-1}>
            <div className="case-manager-head">
              <div>
                <div id="case-manager-title" className="case-manager-title">Case manager</div>
                <div className="case-manager-sub mono">{caseNames.length} saved case{caseNames.length === 1 ? "" : "s"}</div>
              </div>
              <button className="btn" onClick={() => setCaseManagerOpen(false)} aria-label="Close case manager">Close</button>
            </div>
            <div className="case-manager-body">
              <div className="case-manager-list" aria-label="Saved cases">
                {caseNames.length ? caseNames.map(name => {
                  const saved = cases[name] || {};
                  const active = name === managerSelection;
                  return (
                    <button key={name}
                            className={"case-manager-row" + (active ? " active" : "")}
                            onClick={() => selectManagerCase(name)}>
                      <span className="case-manager-name">{name}</span>
                      <span>{saved.meta?.tag || "no tag"}</span>
                      <span>{saved.meta?.docNo || "no doc"}</span>
                      <span>{saved.meta?.rev ? `Rev ${saved.meta.rev}` : "no rev"}</span>
                    </button>
                  );
                }) : (
                  <div className="case-manager-empty">
                    No saved cases yet. Save the current calculation, then manage it here.
                  </div>
                )}
              </div>
              <div className="case-manager-actions">
                <label className="label" htmlFor="case-manager-name">Selected case name</label>
                <input id="case-manager-name"
                       className="case-manager-name-input"
                       value={managerDraftName}
                       disabled={!selectedManagedCase}
                       onChange={e => setManagerDraftName(e.target.value)} />
                <button className="btn" onClick={loadSelectedCase} disabled={!selectedManagedCase}>Load selected</button>
                <button className="btn" onClick={renameSelectedCase} disabled={!selectedManagedCase || !managerDraftName.trim()}>Rename</button>
                <button className="btn" onClick={duplicateSelectedCase} disabled={!selectedManagedCase}>Duplicate</button>
                <button className="btn" onClick={exportSelectedCase} disabled={!selectedManagedCase}>Export selected</button>
                <button className="btn" onClick={() => selectedManagedCase && window.confirm(`Delete "${managerSelection}"?`) && delCase(managerSelection)} disabled={!selectedManagedCase}>Delete</button>
                <div className="case-manager-rule" />
                <button className="btn" onClick={exportCaseLibrary} disabled={!caseNames.length}>Export all</button>
                <button className="btn" onClick={() => importRef.current && importRef.current.click()}>Import JSON</button>
              </div>
            </div>
          </section>
        </div>
      )}

      <div id="panel-calc"
           role="tabpanel"
           aria-labelledby="tab-calc"
           hidden={view !== "calc"}
           className={"view" + (view === "calc" ? " active" : "")}
           data-screen-label="01 Calculator">
        <window.Calculator state={state} setState={setState} />
      </div>
      <div id="panel-report"
           role="tabpanel"
           aria-labelledby="tab-report"
           hidden={view !== "report"}
           className={"view" + (view === "report" ? " active" : "")}
           data-screen-label="02 Report">
        <window.Report state={state} />
      </div>
      <div id="panel-compare"
           role="tabpanel"
           aria-labelledby="tab-compare"
           hidden={view !== "compare"}
           className={"view" + (view === "compare" ? " active" : "")}
           data-screen-label="03 Compare">
        <window.Compare liveState={state} cases={cases} unitSystem={state.unitSystem || "SI"} />
      </div>

      <div className="status">
        <span>DRW · {state.meta?.docNo || ""}</span><span className="sep">│</span>
        <span>REV {state.meta?.rev || ""}</span><span className="sep">│</span>
        <span>SCALE — NTS</span><span className="sep">│</span>
        <span>SHEET 1/1</span><span className="sep">│</span>
        <span>UNITS — {state.unitSystem || "SI"}</span><span className="sep">│</span>
        <span>ρ={state.sys.rho} kg/m³ · μ={state.sys.mu.toFixed(2)} cP</span>
      </div>

      {tweaksOn && (
        <div className="tweaks">
          <header>
            <span>Tweaks</span>
            <span className="mono" style={{color:"var(--mute)"}}>2 opts</span>
          </header>
          <div className="row">
            <div className="label">Layout density</div>
            <div className="seg">
              <button className={density === "airy" ? "on" : ""}
                      onClick={() => { setDensity("airy"); persist({ density: "airy" }); }}>Airy</button>
              <button className={density === "compact" ? "on" : ""}
                      onClick={() => { setDensity("compact"); persist({ density: "compact" }); }}>Compact</button>
            </div>
          </div>
          <div className="row">
            <div className="label">Reset state</div>
            <button className="btn" onClick={() => { localStorage.removeItem("pumpcalc:v4"); setState(initialState); setCaseNotice("Restored current case defaults."); }}>
              Restore current case defaults
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
